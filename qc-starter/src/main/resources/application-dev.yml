server:
  port: 8080

spring:
  application:
    name: qc-admin
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/mars-system?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8
    username: root
    password: 123456
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      test-while-idle: true
      validation-query: SELECT 1
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        login-username: admin
        login-password: admin123
      web-stat-filter:
        enabled: true
        url-pattern: /*
        exclusions: "*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*"
      filter:
        stat:
          enabled: true
        wall:
          enabled: true
  data:
    redis:
      host: localhost
      port: 6379
      password: 123456
      database: 6
      lettuce:
        pool:
          max-active: 8
          max-wait: -1
          max-idle: 8
          min-idle: 0

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.mars.common.entity,com.mars.system.entity,com.mars.file.entity,com.mars.gen.entity,com.mars.message.entity,com.mars.mall.entity,com.mars.job.entity,com.mars.biz.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0


# ======================== 应用配置 ========================
mars:
  # 演示模式配置（此处为开发环境默认值，生产环境请在 application-prod.yml 中配置）
  # true: 开启演示模式，禁止新增、编辑、删除操作
  # false: 关闭演示模式，允许所有操作
  demo-mode: false

# 日志配置
logging:
  level:
    com.mars: debug
